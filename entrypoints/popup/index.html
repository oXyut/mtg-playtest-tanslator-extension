<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>MTG デッキ日本語化</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 260px;
        margin: 0;
        padding: 12px 16px;
        font-size: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      h2 {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: none;
        margin: 12px 0 2px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        cursor: pointer;
      }
      .footer {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      button {
        cursor: pointer;
      }
      #status {
        color: #2a7;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>MTG デッキ日本語化</h1>
    <h2>カード画像の日本語化</h2>
    <label>
      <input type="checkbox" id="moxfield" />
      Moxfield
    </label>
    <label>
      <input type="checkbox" id="archidekt" />
      Archidekt
    </label>
    <h2>補助機能</h2>
    <label>
      <input type="checkbox" id="hover-zoom" />
      ホバーでカードを拡大 (Archidekt)
    </label>
    <label>
      <input type="checkbox" id="jp-prices" />
      日本の店舗価格を表示
    </label>
    <label style="display: block; padding-left: 24px;">
      価格の店舗
      <select id="price-store" style="width: 100%; margin-top: 2px;">
        <option value="hareruya">晴れる屋</option>
        <option value="lowest">店舗問わず最安</option>
        <option value="wg:カードラッシュ">カードラッシュ</option>
        <option value="wg:トレトク">トレトク</option>
        <option value="wg:Cardshop Serra">Cardshop Serra</option>
        <option value="wg:CARDSHOP黒枠">CARDSHOP黒枠</option>
        <option value="wg:ENNDAL GAMES">ENNDAL GAMES</option>
      </select>
    </label>
    <div style="font-size: 11px; color: #888; padding-left: 24px;">
      店舗を変えたらページを再読み込みしてください
    </div>
    <div class="footer">
      <button id="clear-cache">キャッシュをクリア</button>
      <span id="status"></span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
